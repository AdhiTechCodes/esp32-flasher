<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ESP32 Firmware Installer</title>

<script type="module"
src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js">
</script>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin-top:50px;
    background:#f5f5f5;
}

.card{
    width:500px;
    margin:auto;
    padding:20px;
    background:white;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
    margin-top:15px;
}

#doneBtn{
    display:none;
}

#status{
    margin-top:20px;
    font-weight:bold;
    color:green;
}
</style>
</head>

<body>

<div class="card">

<h1>ESP32 Firmware Installer</h1>

<h3>
Total Installations:
<span id="count">0</span>
</h3>

<esp-web-install-button
id="installer"
manifest="manifest.json">
</esp-web-install-button>

<br>

<button id="doneBtn">
Done
</button>

<div id="status"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  doc,
  getDoc,
  updateDoc,
  collection,
  addDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBI9PYPpqAd_5uX5b3ICQ6fLgBaJ_8mDLVc",
  authDomain: "esp32-flasher-e402f.firebaseapp.com",
  projectId: "esp32-flasher-e402f",
  storageBucket: "esp32-flasher-e402f.firebasestorage.app",
  messagingSenderId: "835141727928",
  appId: "1:835141727928:web:d1c0a557c7611c4002e64d",
  measurementId: "G-FP2HTH72EG"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const counterRef = doc(db,"stats","counter");

async function loadCount(){

    const snap = await getDoc(counterRef);

    if(snap.exists()){

        document.getElementById("count").innerHTML =
        snap.data().count;

    }

}

loadCount();

document.getElementById("doneBtn")
.addEventListener("click", async ()=>{

    const snap = await getDoc(counterRef);

    let currentCount = 0;

    if(snap.exists()){

        currentCount =
        snap.data().count || 0;

    }

    const newCount = currentCount + 1;

    await updateDoc(counterRef,{
        count:newCount
    });

    await addDoc(
        collection(db,"installs"),
        {
            timestamp:new Date().toISOString()
        }
    );

    await loadCount();

    document.getElementById("status").innerHTML =
    "✅ Installation #" +
    newCount +
    " Saved Successfully";

    document.getElementById("doneBtn")
    .style.display="none";

});

const installer =
document.getElementById("installer");

/*
Since ESP Web Tools doesn't provide a reliable
success callback in the default component,
we show Done button after flashing page is used.
*/

installer.addEventListener("click", ()=>{

    setTimeout(()=>{

        document.getElementById("doneBtn")
        .style.display="inline-block";

    },15000);

});

</script>

</body>
</html>
