<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ESP32 Firmware Installer</title>

<script type="module"
src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js">
</script>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin-top:50px;
}

.card{
    width:500px;
    margin:auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}

#status{
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<h1>ESP32 Firmware Installer</h1>

<h3>Total Installations:
<span id="count">0</span>
</h3>

<esp-web-install-button
id="installer"
manifest="manifest.json">
</esp-web-install-button>

<div id="status"></div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBI9PYPpqAd_5uX5b3ICQ6fLgBaJ_8mDLVc",
  authDomain: "esp32-flasher-e402f.firebaseapp.com",
  projectId: "esp32-flasher-e402f",
  storageBucket: "esp32-flasher-e402f.firebasestorage.app",
  messagingSenderId: "835141727928",
  appId: "1:835141727928:web:d1c0a557c7611c4002e64d",
  measurementId: "G-FP2HTH72EG"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadCount() {

    const snap =
    await getDoc(doc(db,"stats","counter"));

    if(snap.exists()) {

        document.getElementById("count").innerHTML =
        snap.data().count;

    }
}

loadCount();

</script>

</body>
</html>
