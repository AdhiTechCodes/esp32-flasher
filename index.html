<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ESP32 Firmware Installer</title>

<script type="module"
import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  doc,
  getDoc,
  updateDoc,
  collection,
  addDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
</script>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin-top:50px;
}

.card{
    width:500px;
    margin:auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

#success{
    display:none;
    margin-top:20px;
}

button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<h1>ESP32 Firmware Installer</h1>

<h3>Total Installations:
<span id="count">0</span>
</h3>

<esp-web-install-button
id="installer"
manifest="manifest.json">
</esp-web-install-button>

<div id="success">

<h2>✅ Installation Complete</h2>

<h3>
Installation Number:
<span id="installNo"></span>
</h3>

<button id="consoleBtn">
Logs & Console
</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
updateDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBI9PYPpqAd_5uX5b3ICQ6fLgBaJ_8mDLVc",
  authDomain: "esp32-flasher-e402f.firebaseapp.com",
  projectId: "esp32-flasher-e402f",
  storageBucket: "esp32-flasher-e402f.firebasestorage.app",
  messagingSenderId: "835141727928",
  appId: "1:835141727928:web:d1c0a557c7611c4002e64d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const counterRef = doc(db,"stats","counter");

async function loadCount(){
    const snap = await getDoc(counterRef);

    if(snap.exists()){
        document.getElementById("count").innerHTML =
        snap.data().count;
    }
}

loadCount();

/*
ESP Web Tools currently handles completion internally.
You can manually update the counter using a button
or extend this later if you implement a serial
confirmation message from the ESP32.
*/

document.getElementById("consoleBtn").onclick=()=>{
    alert("Use the ESP Web Tools Logs & Console option.");
};

</script>

</body>
</html>
